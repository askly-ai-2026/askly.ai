<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – Askly AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>USER REGISTRATION</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-message">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="signup-password" required>
                    <button type="button" class="toggle-password" tabindex="-1"><i class="far fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="auth-btn">CREATE ACCOUNT</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
            <br>
            <a href="{{ url_for('landing') }}" style="color: var(--accent-cyan);">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
</div>
<script>
    document.querySelector('.toggle-password').addEventListener('click', function() {
        const input = document.getElementById('signup-password');
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
    });
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.classList.add(theme);
</script>
</body>
</html>
