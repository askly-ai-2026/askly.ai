<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password – Askly AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>RESET PASSWORD</h1>
        <p style="text-align: center; margin-bottom: 20px;">Enter your email to receive a 6-digit OTP.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-message">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" name="email" required autofocus>
            </div>
            <button type="submit" class="auth-btn">SEND OTP</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('login') }}">Back to Login</a>
        </div>
    </div>
</div>
<script>
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.classList.add(theme);
</script>
</body>
</html>
